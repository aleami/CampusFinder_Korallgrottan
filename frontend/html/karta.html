    function calculateDistanceInMeters(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const toRad = deg => deg * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLng = toRad(lng2 - lng1);
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                  Math.sin(dLng/2) * Math.sin(dLng/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function formatDistance(meters) {
        if (meters == null) return '';
        if (meters < 1000) return `${Math.round(meters)} m`;
        return `${(meters / 1000).toFixed(1)} km`;
    }

    function requestUserLocation() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                reject(new Error('Geolocation is not supported by your browser.'));
                return;
            }
            navigator.geolocation.getCurrentPosition(
                pos => resolve({
                    latitude: pos.coords.latitude,
                    longitude: pos.coords.longitude,
                    accuracy: pos.coords.accuracy
                }),
                err => reject(new Error('Could not get your location: ' + err.message))
            );
        });
    }

    function isRestaurant(place) {
        return place.type === 'restaurant';
    }

    function getRestaurantCategory(place) {
        return restaurantCategories[place.id] || { label: 'Mat & dryck', icon: '🍽️' };
    }

    function getRenderableSections(place) {
        if (isTHSPlace(place)) {
            return [];
        }

        const sections = [...(place.sections || [])];

        if (place.id === 'nymble' && !sections.some(section => (section.logoText || section.shortName || '').toUpperCase() === 'THS')) {
            sections.push({
                id: 'ths-nymble',
                name: 'THS',
                shortName: 'THS',
                logoText: 'THS',
                buildingName: 'Nymble',

                lng: 18.071147192003597,

                description: 'Student union building at Nymble.'
            });

        return sections;
    }

    function getRestaurantIcon(place) {
        const category = getRestaurantCategory(place);
        const markerContent = category.logo
            ? `<img src="${escapeHtml(category.logo)}" alt="${escapeHtml(category.label)}" style="width:auto!important;height:auto!important;max-width:34px!important;max-height:28px!important;object-fit:contain!important;">`
            : `<span>${category.icon}</span>`;
        return L.divIcon({
            className: '',
            html: `<div class="restaurant-logo-marker" title="${escapeHtml(category.label)}">${markerContent}</div>`,
            iconSize: [46, 46],
            iconAnchor: [23, 23],
            popupAnchor: [0, -20]
        });
    }

    function normalizeSearchText(value) {
        return String(value || '')
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-zA-Z0-9]+/g, ' ')
            .replace(/\s+/g, ' ')
            .trim()
            .toLowerCase();
    }

    function compactSearchText(value) {
        return normalizeSearchText(value).replace(/\s+/g, '');
    }

    function getSearchVariants(value) {
        const normalized = normalizeSearchText(value);
        const compact = compactSearchText(value);
        const variants = new Set([normalized, compact]);
        const letterHouseMatch = normalized.match(/^([a-z])\s*huset$/i);

        if (letterHouseMatch) {
            const letter = letterHouseMatch[1].toLowerCase();
            variants.add(`${letter}huset`);
            variants.add(`${letter} huset`);
            variants.add(`${letter} hus`);
            variants.add(`${letter}hus`);
            variants.add(`${letter}-huset`);
        }

        const groupRoomMatch = normalized.match(/^([a-z])\s*grupprum\s*(\d+)$/i);
        if (groupRoomMatch) {
            const [, letter, roomNumber] = groupRoomMatch;
            variants.add(`${letter.toLowerCase()}grupprum${roomNumber}`);
            variants.add(`${letter.toLowerCase()} grupprum ${roomNumber}`);
        }

        return [...variants].filter(Boolean);
    }

    function normalizeRoomName(value) {
        return String(value || '')
            .trim()
            .replace(/\s*\(.*?\)\s*/g, '')
            .toUpperCase();
    }

    function getPlaceBuildingCode(place) {
        const match = String(place.name || '').match(/^([A-Z])-/i);
        return match ? match[1].toUpperCase() : null;
    }

    function getCurrentAndNextReservation(reservedTimes) {
        const now = new Date();
        const reservations = [...(reservedTimes || [])]
            .sort((a, b) => new Date(a.start) - new Date(b.start));

        let currentReservation = null;
        let nextReservation = null;

        for (const reservation of reservations) {
            const start = new Date(reservation.start);
            const end = new Date(reservation.end);

            if (start <= now && now < end) {
                currentReservation = reservation;
                break;
            }

            if (start > now) {
                nextReservation = reservation;
                break;
            }
        }

        return { currentReservation, nextReservation };
    }

    function createBookingStatus(scheduleRoom) {
        if (!scheduleRoom || scheduleRoom.hide) return null;

        const { currentReservation, nextReservation } = getCurrentAndNextReservation(scheduleRoom.reservedTimes);

        return {
            isBookable: true,
            requiresAccess: !!scheduleRoom.requiresAccess,
            isBookedNow: !!currentReservation,
            currentReservation,
            nextReservation
        };
    }

    function formatReservationTime(value) {
        return new Date(value).toLocaleTimeString('sv-SE', {
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function formatBookingStatus(bookingStatus) {
        if (!bookingStatus || !bookingStatus.isBookable) return null;

        if (bookingStatus.isBookedNow && bookingStatus.currentReservation) {
            return {
                text: `Booked now ${formatReservationTime(bookingStatus.currentReservation.start)}-${formatReservationTime(bookingStatus.currentReservation.end)}`,
                className: 'booked'
            };
        }

        if (bookingStatus.nextReservation) {
            return {
                text: `Free now, booked ${formatReservationTime(bookingStatus.nextReservation.start)}-${formatReservationTime(bookingStatus.nextReservation.end)}`,
                className: 'free'
            };
        }

        return {
            text: bookingStatus.requiresAccess ? 'Free today, requires access' : 'Free today',
            className: 'free'
        };
    }

    function isGroupRoomSearch(query) {
        return [
            'grupprum',
            'group room',
            'group-room',
            'bookable',
            'bokningsbar',
            'studierum'
        ].some(keyword => query.includes(keyword));
    }

    function roomMatchesQuery(room, query) {
        if (!query) return false;

        const bookingStatus = formatBookingStatus(room.bookingStatus);
        const text = normalizeSearchText([
            room.name,
            room.address,
            room.buildingName,
            room.type,
            room.notes,
            bookingStatus && bookingStatus.text
        ].join(' '));

        if (text.includes(query)) return true;

        return isGroupRoomSearch(query) && (
            room.type === 'group-room' ||
            room.type === 'bookable-room' ||
            !!room.bookingStatus
        );
    }

    function mergePlacesWithSchedule(basePlaces, scheduleBuildings) {
        if (!scheduleBuildings || !scheduleBuildings.length) {
            return basePlaces;
        }

        const scheduleByBuildingCode = new Map(
            scheduleBuildings.map(building => [String(building.name || '').toUpperCase(), building])
        );

        return basePlaces.map(place => {
            if (isRestaurant(place)) return place;

            const buildingCode = getPlaceBuildingCode(place);
            const scheduleBuilding = buildingCode ? scheduleByBuildingCode.get(buildingCode) : null;

            if (!scheduleBuilding) return place;

            const scheduleRooms = new Map(
                (scheduleBuilding.rooms || [])
                    .filter(room => !room.hide)
                    .map(room => [normalizeRoomName(room.name), room])
            );

            const mergedRooms = (place.rooms || []).map(room => ({
                ...room,
                bookingStatus: createBookingStatus(scheduleRooms.get(normalizeRoomName(room.name)))
            }));

            for (const scheduleRoom of scheduleRooms.values()) {
                const roomName = normalizeRoomName(scheduleRoom.name);
                const alreadyExists = mergedRooms.some(room => normalizeRoomName(room.name) === roomName);

                if (alreadyExists) continue;

                mergedRooms.push({
                    id: scheduleRoom.externalId || `${place.id}-${roomName.toLowerCase()}`,
                    name: scheduleRoom.name,
                    type: 'bookable-room',
                    seats: 0,
                    available: false,
                    notes: scheduleRoom.requiresAccess ? 'Requires access' : 'Bookable room',
                    bookingStatus: createBookingStatus(scheduleRoom)
                });
            }

            mergedRooms.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

            return {
                ...place,
                rooms: mergedRooms,
                roomCount: Math.max(place.roomCount || 0, mergedRooms.length)
            };
        });
    }

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function getDistanceForPlace(place) {
        if (!userLocation) return null;
        return calculateDistanceInMeters(
            userLocation.latitude, userLocation.longitude,
            place.lat, place.lng
        );
    }

    function getPlaceSearchText(place) {
        return [
            place.name,
            place.searchText,
            ...(place.addresses || []),
            ...(place.rooms || []).flatMap(room => {
                const bookingStatus = formatBookingStatus(room.bookingStatus);
                return [
                    room.name,
                    ...getSearchVariants(room.name),
                    room.address,
                    room.buildingName,
                    ...getSearchVariants(room.buildingName),
                    room.type,
                    room.notes,
                    bookingStatus && bookingStatus.text
                ];
            }),
            ...getSearchVariants(place.name),
            ...((place.microwaves && place.microwaves.locations) || []).flatMap(l => [l.name, ...getSearchVariants(l.name), l.address]),
            ...((place.printers && place.printers.locations) || []).flatMap(l => [l.name, ...getSearchVariants(l.name), l.address]),
            ...(place.sections || []).flatMap(s => [s.name, ...getSearchVariants(s.name), s.shortName, s.buildingName, ...getSearchVariants(s.buildingName), s.description])
        ].join(' ');
    }

    function searchTextMatches(haystack, query) {
        const normalizedHaystack = normalizeSearchText(haystack);
        const compactHaystack = compactSearchText(haystack);
        const normalizedQuery = normalizeSearchText(query);
        const compactQuery = compactSearchText(query);

        return normalizedHaystack.includes(normalizedQuery) || compactHaystack.includes(compactQuery);
    }

    function isStaticBookableRoom(room) {
        const normalizedName = normalizeSearchText(room && room.name);
        const normalizedType = normalizeSearchText(room && room.type);
        return normalizedType === 'bookable room'
            || normalizedType === 'group room'
            || normalizedType === 'group-room'
            || normalizedName.includes('grupprum')
            || normalizedName.includes('group room');
    }

    function hasBookableRooms(place) {
        return (place.rooms || []).some(room =>
            room.type === 'bookable-room' ||
            room.type === 'group-room' ||
            !!room.bookingStatus ||
            isStaticBookableRoom(room)
        );
    }

    function hasAvailableBookableRooms(place) {
        return (place.rooms || []).some(room =>
            room.bookingStatus &&
            room.bookingStatus.isBookable &&
            !room.bookingStatus.isBookedNow
        );
    }

    function placeMatchesCategory(place, category) {
        if (category === 'all') return true;
        if (category === 'restaurants') return isRestaurant(place);
        if (category === 'buildings') return !isRestaurant(place);
        if (category === 'availableBookable') return !isRestaurant(place) && hasAvailableBookableRooms(place);
        if (category === 'bookable') return !isRestaurant(place) && hasBookableRooms(place);
        if (category === 'microwaves') return !!place.microwaves;
        if (category === 'printers') return !!place.printers;
        return false;
    }

    function getCategoryPlaces(category) {
        if (!category) return [];
        if (category === 'all') return places;
        return places.filter(place => placeMatchesCategory(place, category));
    }

    function getMicrowaveLocations(place) {
        return ((place.microwaves && place.microwaves.locations) || [])
            .filter(location =>
                typeof location.lat === 'number' &&
                typeof location.lng === 'number'
            );
    }

    function getMicrowaveMarkerGroups(nextPlaces) {
        const groups = new Map();

        nextPlaces.forEach(place => {
            getMicrowaveLocations(place).forEach(location => {
                const key = `${location.lat.toFixed(6)}:${location.lng.toFixed(6)}`;
                if (!groups.has(key)) {
                    groups.set(key, {
                        place,
                        lat: location.lat,
                        lng: location.lng,
                        count: 0,
                        locations: []
                    });
                }

                groups.get(key).count += Number(location.count || 1);
                groups.get(key).locations.push(location);
            });
        });

        return [...groups.values()];
    }

    function getPrinterLocations(place) {
        return ((place.printers && place.printers.locations) || [])
            .filter(location =>
                typeof location.lat === 'number' &&
                typeof location.lng === 'number'
            );
    }

    function getPrinterMarkerGroups(nextPlaces) {
        const groups = new Map();

        nextPlaces.forEach(place => {
            getPrinterLocations(place).forEach(location => {
                const key = `${location.lat.toFixed(6)}:${location.lng.toFixed(6)}`;
                if (!groups.has(key)) {
                    groups.set(key, {
                        place,
                        lat: location.lat,
                        lng: location.lng,
                        count: 0,
                        locations: []
                    });
                }

                groups.get(key).count += Number(location.count || 1);
                groups.get(key).locations.push(location);
            });
        });

        return [...groups.values()];
    }

    function getSearchResults() {
        const q = input.value.trim();
        if (!q) return [];

        return places
            .filter(place =>
                searchTextMatches(getPlaceSearchText(place), q) ||
                (place.rooms || []).some(room => roomMatchesQuery(room, normalizeSearchText(q)))
            )
            .sort((a, b) => {
                const aD = getDistanceForPlace(a), bD = getDistanceForPlace(b);
                if (aD == null && bD == null) return 0;
                if (aD == null) return 1;
                if (bD == null) return -1;
                return aD - bD;
            })
            .slice(0, 12);
    }

    function updateCategoryButtons() {
        categoryFilters.querySelectorAll('.category-chip').forEach(button => {
            button.classList.toggle('active', button.dataset.category === activeCategory);
        });
        updatePopularPlaces();
    }

    function getPopularMode() {
        const mode = activeNearbyCategory || activeCategory;
        if (mode === 'restaurants') return 'restaurants';
        if (mode === 'buildings') return 'buildings';
        return null;
    }

    function getPopularPlaces(mode) {
        const ids = mode === 'buildings' ? POPULAR_BUILDING_IDS : POPULAR_RESTAURANT_IDS;
        return ids
            .map(id => places.find(place => place.id === id))
            .filter(Boolean)
            .slice(0, 3);
    }

    function getPopularPlaceVisual(place) {
        if (isRestaurant(place)) {
            const category = getRestaurantCategory(place);
            return {
                label: category.label,
                visual: category.logo
                    ? `<img src="${escapeHtml(category.logo)}" alt="${escapeHtml(category.label)}">`
                    : `<span aria-hidden="true">${category.icon}</span>`
            };
        }

        if (place.id === 'building-25') return { label: 'Bibliotek & studieplats', visual: '<span aria-hidden="true">📚</span>' };
        if (place.id === 'building-59') return { label: 'Kårhus & studentliv', visual: '<span aria-hidden="true">🏛️</span>' };
        if (place.id === 'building-39') return { label: 'Byggnad', visual: '<span aria-hidden="true">🏫</span>' };
        return { label: 'Byggnad', visual: '<span aria-hidden="true">🏢</span>' };
    }

    function updatePopularPlaces() {
        if (!popularPlaces || !popularPlacesList) return;
        const mode = getPopularMode();
        const showPanel = !!mode && places.length > 0;
        popularPlaces.hidden = !showPanel;
        if (!showPanel) {
            popularPlacesList.innerHTML = '';
            return;
        }

        popularPlacesEyebrow.textContent = mode === 'buildings' ? 'Populära byggnader' : 'Populärt just nu';
        popularPlacesTitle.textContent = mode === 'buildings'
            ? 'Mest använda platser på campus'
            : 'Studentfavoriter nära campus';

        const popular = getPopularPlaces(mode);
        popularPlacesList.innerHTML = popular.map((place, index) => {
            const item = getPopularPlaceVisual(place);
            return `
                <button class="popular-restaurant-card" type="button" data-place-id="${escapeHtml(place.id)}">
                    <span class="popular-rank">#${index + 1}</span>
                    <span class="popular-icon">${item.visual}</span>
                    <span class="popular-copy">
                        <strong>${escapeHtml(place.name)}</strong>
                        <em>${escapeHtml(item.label)}</em>
                    </span>
                </button>
            `;
        }).join('');

        popularPlacesList.querySelectorAll('.popular-restaurant-card').forEach(card => {
            card.addEventListener('click', () => {
                const place = places.find(item => item.id === card.dataset.placeId);
                if (place) selectPlace(place);
            });
        });
    }

    function updateCategoryScrollHint() {
        const canScroll = categoryFilters.scrollWidth > categoryFilters.clientWidth + 8;
        const reachedEnd = categoryFilters.scrollLeft + categoryFilters.clientWidth >= categoryFilters.scrollWidth - 8;

        categoryFilters.classList.toggle('is-scrollable', canScroll);
        categoryFilters.classList.toggle('is-at-end', reachedEnd);
        categoryScrollHint.hidden = !canScroll || reachedEnd;
    }

    function updateNearbyScrollHint() {
        const canScroll = nearbyFilters.scrollWidth > nearbyFilters.clientWidth + 8;
        const reachedEnd = nearbyFilters.scrollLeft + nearbyFilters.clientWidth >= nearbyFilters.scrollWidth - 8;

        nearbyFilters.classList.toggle('is-scrollable', canScroll);
        nearbyFilters.classList.toggle('is-at-end', reachedEnd);
        nearbyScrollHint.hidden = !nearbyPanelOpen || !canScroll || reachedEnd;
    }

    function getNearbyCategoryLabel(category) {
        const labels = {
            all: 'places',
            availableBookable: 'available rooms',
            bookable: 'bookable rooms',
            restaurants: 'restaurants',
            microwaves: 'microwaves',
            printers: 'printers',
            buildings: 'buildings'
        };
        return labels[category] || 'places';
    }

    function getNearbyPlaces(category) {
        if (!category || !userLocation) return [];
        return getCategoryPlaces(category)
            .map(place => ({ ...place, distanceInMeters: getDistanceForPlace(place) }))
            .filter(place => place.distanceInMeters != null)
            .sort((a, b) => a.distanceInMeters - b.distanceInMeters)
            .slice(0, NEARBY_RESULT_LIMIT);
    }

    function updateNearbyButtons() {
        nearbyToggleButton.classList.toggle('active', nearbyPanelOpen);
        nearbyToggleButton.setAttribute('aria-expanded', nearbyPanelOpen ? 'true' : 'false');
        nearbyFilters.querySelectorAll('.nearby-chip').forEach(button => {
            button.classList.toggle('active', button.dataset.nearbyCategory === activeNearbyCategory);
        });
        updatePopularPlaces();
    }

    function updateNearbyPanel() {
        updateNearbyButtons();
        updateNearbyScrollHint();
        if (!nearbyPanelOpen) return;

        if (!places.length) {
            nearbyMeta.textContent = 'Loading...';
            nearbyList.innerHTML = '<div class="nearby-item muted">Nearby data is loading.</div>';
            return;
        }

        if (!activeNearbyCategory) {
            nearbyMeta.textContent = 'Choose a filter';
            nearbyList.innerHTML = '<div class="nearby-item muted">Choose what you want to find nearby.</div>';
            return;
        }

        if (!userLocation) {
            nearbyMeta.textContent = 'Location needed';
            nearbyList.innerHTML = '<div class="nearby-item muted">Allow location access to sort nearby places.</div>';
            return;
        }

        const nearbyPlaces = getNearbyPlaces(activeNearbyCategory);
        const label = getNearbyCategoryLabel(activeNearbyCategory);
        nearbyMeta.textContent = `${nearbyPlaces.length} nearest ${label}`;

        if (!nearbyPlaces.length) {
            nearbyList.innerHTML = `<div class="nearby-item muted">No ${escapeHtml(label)} found nearby.</div>`;
            return;
        }

        nearbyList.innerHTML = nearbyPlaces.map(place => `
            <button class="nearby-item" type="button" data-place-id="${escapeHtml(place.id)}">
                <strong>${escapeHtml(place.name)}</strong>
                <span>${formatDistance(place.distanceInMeters)}</span>
            </button>
        `).join('');

        nearbyList.querySelectorAll('.nearby-item[data-place-id]').forEach(item => {
            item.addEventListener('click', () => {
                const place = places.find(entry => entry.id === item.dataset.placeId);
                if (place) selectPlace(place);
            });
        });
    }

    function setNearbyPanelOpen(isOpen) {
        nearbyPanelOpen = isOpen;
        nearbyPanel.hidden = !nearbyPanelOpen;
        updateNearbyPanel();
    }

    function hideNearbyPanel() {
        setNearbyPanelOpen(false);

                    </div>
                    ${navigateButton}
                    ${actionLinks ? `<div class="restaurant-popup-actions">${actionLinks}</div>` : ''}
                </div>
            `;
        }

        const rooms = place.rooms || [];
        const addresses = (place.addresses || []).slice(0, 3).join(', ');
        const sections = getRenderableSections(place).slice(0, 5);
        const roomRows = rooms.map(room => {
            const bookingStatus = formatBookingStatus(room.bookingStatus);
            return `
                <li>
                    ${room.mapsUrl ? `<a href="${escapeHtml(room.mapsUrl)}" target="_blank" rel="noreferrer">${escapeHtml(room.name)}</a>` : escapeHtml(room.name)}
                    ${room.address ? `<span>${escapeHtml(room.address)}</span>` : ''}
                    ${bookingStatus ? `<span class="booking-status ${escapeHtml(bookingStatus.className)}">${escapeHtml(bookingStatus.text)}</span>` : ''}
                    ${!bookingStatus && isStaticBookableRoom(room) ? '<span class="booking-status free">Bookable room</span>' : ''}
                </li>
            `;
        }).join('');
        const sectionRows = sections.map(section => {
            const sectionCode = escapeHtml(section.logoText || section.shortName || 'SEC').toUpperCase();
            return `
            <li class="popup-section-row">
                <span class="popup-section-badge" data-section-code="${sectionCode}">${sectionCode}</span>
                <div>
                    <strong>${escapeHtml(section.name)}</strong>
                    ${section.description ? `<span>${escapeHtml(section.description)}</span>` : ''}
                </div>
            </li>
        `;
        }).join('');

        return `
            <div class="map-popup">
                <h3>${escapeHtml(place.name)}</h3>
                ${distanceInMeters != null ? `<p><strong>Distance:</strong> ${formatDistance(distanceInMeters)}</p>` : ''}
                <p>${place.roomCount || (place.rooms || []).length} rooms in campus data</p>
                ${addresses ? `<p class="popup-address">${escapeHtml(addresses)}</p>` : ''}
                ${navigateButton}
                ${place.sections ? `<p class="popup-feature"><span class="popup-feature-icon">&#x1F3E0;</span>${place.sections.length} section spaces</p>` : ''}
                ${place.microwaves ? `<p class="popup-feature"><span class="popup-feature-icon">&#x2668;</span>${place.microwaves.count} microwaves</p>` : ''}
                ${place.printers ? `<p class="popup-feature"><span class="popup-feature-icon">&#x1F5A8;</span>${place.printers.count} printers</p>` : ''}
                ${sectionRows ? `<ul class="popup-sections-list">${sectionRows}</ul>` : ''}
                ${roomRows ? `<ul>${roomRows}</ul>` : ''}
                ${rooms.length ? `<small>Showing all ${rooms.length} rooms.</small>` : ''}
            </div>
        `;
    }

    function clearRoute() {
        activeDestinationId = null;
        activeDestination = null;
        if (activeRoute) { activeRoute.remove(); activeRoute = null; }
        if (paramDestinationMarker) {
            paramDestinationMarker.remove();
            paramDestinationMarker = null;
        }
        if (navigationWatchId != null && navigator.geolocation) {
            navigator.geolocation.clearWatch(navigationWatchId);
            navigationWatchId = null;
        }
        stopNavigationButton.hidden = true;
    }

    function stopNavigation(message = 'Navigation stopped.') {
        clearRoute();
        routeMessage.textContent = message;
    }

    function stopNavigationForContextChange(message = 'Navigation stopped because the map view changed.') {
        if (!activeDestinationId && !activeRoute) return;
        stopNavigation(message);
    }

    function startNavigationWatch(place) {
        if (!navigator.geolocation) return;
        if (navigationWatchId != null) {
            navigator.geolocation.clearWatch(navigationWatchId);
        }

        navigationWatchId = navigator.geolocation.watchPosition(
            pos => {
                const nextLocation = {
                    latitude: pos.coords.latitude,
                    longitude: pos.coords.longitude,
                    accuracy: pos.coords.accuracy
                };
                setUserLocationOnMap(nextLocation);

                const distanceToDestination = calculateDistanceInMeters(
                    nextLocation.latitude,
                    nextLocation.longitude,
                    place.lat,
                    place.lng
                );

                if (distanceToDestination <= 30) {
                    stopNavigation(`You have arrived at ${place.name}.`);
                }
            },
            () => {},
            {
                enableHighAccuracy: true,
                timeout: 12000,
                maximumAge: 5000
            }
        );
    }

    function setUserLocationOnMap(location, label = 'You are here') {
        userLocation = location;
        if (userMarker) userMarker.remove();
        if (userAccuracyCircle) userAccuracyCircle.remove();
        userMarker = L.marker([userLocation.latitude, userLocation.longitude], {
            icon: L.divIcon({
                className: '',
                html: '<div class="user-location-marker"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            })
        }).addTo(map).bindPopup(label);

        if (userLocation.accuracy) {
            userAccuracyCircle = L.circle([userLocation.latitude, userLocation.longitude], {
                radius: userLocation.accuracy,
                color: '#2f80ed', weight: 1,
                fillColor: '#2f80ed', fillOpacity: 0.12
            }).addTo(map);
        } else {
            userAccuracyCircle = null;
        }
    }

    function drawRouteLine(latLngs, options = {}) {
        if (activeRoute) activeRoute.remove();
        activeRoute = L.polyline(latLngs, {
            color: options.color || '#16a34a',
            weight: options.weight || 6,
            opacity: options.opacity || 0.9,
            lineCap: 'round',
            lineJoin: 'round',
            dashArray: Object.prototype.hasOwnProperty.call(options, 'dashArray') ? options.dashArray : '10 8'
        }).addTo(map);
        map.fitBounds(L.latLngBounds(latLngs), { padding: [60, 60], maxZoom: 18 });
    }

    function formatWalkingTime(seconds) {
        const minutes = Math.max(1, Math.round(seconds / 60));
        if (minutes < 60) return `${minutes} min walk`;
        const hours = Math.floor(minutes / 60);
        const rem = minutes % 60;
        return rem ? `${hours} h ${rem} min walk` : `${hours} h walk`;
    }

    function getNearestCampusNodeId(point) {
        return Object.entries(CAMPUS_PATH_NODES)
            .map(([nodeId, nodePoint]) => ({
                nodeId,
                distance: calculateDistanceInMeters(point[0], point[1], nodePoint[0], nodePoint[1])
            }))
            .sort((a, b) => a.distance - b.distance)[0];
    }

    function createCampusGraph() {
        const graph = new Map();
        const graphPoints = { ...CAMPUS_PATH_NODES };

        function ensureNode(id) { if (!graph.has(id)) graph.set(id, []); }
        function addEdge(fromId, toId) {
            const fp = graphPoints[fromId], tp = graphPoints[toId];
            const distance = calculateDistanceInMeters(fp[0], fp[1], tp[0], tp[1]);
            ensureNode(fromId); ensureNode(toId);
            graph.get(fromId).push({ to: toId, distance });
            graph.get(toId).push({ to: fromId, distance });
        }

        Object.keys(graphPoints).forEach(ensureNode);
        CAMPUS_PATH_EDGES.forEach(([a, b]) => addEdge(a, b));
        return { graph, graphPoints };
    }

    function findShortestCampusPath(startPoint, endPoint) {
        const startNode = getNearestCampusNodeId(startPoint);
        const endNode = getNearestCampusNodeId(endPoint);
        if (!startNode || !endNode) return null;

        const { graph, graphPoints } = createCampusGraph();
        const distances = new Map();
        const previous = new Map();
        const unvisited = new Set(graph.keys());

        graph.forEach((_, nodeId) => distances.set(nodeId, Infinity));
        distances.set(startNode.nodeId, 0);

        while (unvisited.size) {
            let currentNode = null, bestDistance = Infinity;
            unvisited.forEach(nodeId => {
                const d = distances.get(nodeId);
                if (d < bestDistance) { bestDistance = d; currentNode = nodeId; }
            });
            if (!currentNode || currentNode === endNode.nodeId) break;
            unvisited.delete(currentNode);
            for (const edge of graph.get(currentNode)) {
                if (!unvisited.has(edge.to)) continue;
                const alt = distances.get(currentNode) + edge.distance;
                if (alt < distances.get(edge.to)) {
                    distances.set(edge.to, alt);
                    previous.set(edge.to, currentNode);
                }
            }
        }

        const pathIds = [];
        let current = endNode.nodeId;
        while (current) {
            pathIds.unshift(current);
            current = previous.get(current);
            if (current === startNode.nodeId) { pathIds.unshift(current); break; }
        }
        if (pathIds[0] !== startNode.nodeId || pathIds[pathIds.length - 1] !== endNode.nodeId) return null;

        const latLngs = pathIds.map(nodeId => graphPoints[nodeId]);
        let totalDistance = 0;
        for (let i = 1; i < latLngs.length; i++) {
            totalDistance += calculateDistanceInMeters(latLngs[i-1][0], latLngs[i-1][1], latLngs[i][0], latLngs[i][1]);
        }
        return { latLngs, distance: totalDistance, startOffset: startNode.distance, endOffset: endNode.distance, startNodeId: startNode.nodeId, endNodeId: endNode.nodeId };
    }

    function estimateWalkingDurationSeconds(distanceInMeters) {
        const walkingSpeedMetersPerSecond = 1.35;
        return Math.max(60, Math.round(distanceInMeters / walkingSpeedMetersPerSecond));
    }

    function drawCampusFallbackRoute(startPoint, endPoint, place) {
        const campusPath = findShortestCampusPath(startPoint, endPoint);
        if (!campusPath || !campusPath.latLngs || campusPath.latLngs.length < 2) {
            throw new Error('No local campus walking route was found.');
        }

        const routeLatLngs = [
            startPoint,
            ...campusPath.latLngs,
            endPoint
        ];
        const totalDistance = campusPath.distance + campusPath.startOffset + campusPath.endOffset;

        clearRoute();
        activeDestinationId = place.id;
        activeDestination = place;
        drawRouteLine(routeLatLngs, { color: '#16a34a', weight: 6, opacity: 0.9, dashArray: '10 8' });
        routeMessage.textContent = `${place.name}: ${formatDistance(totalDistance)} | ${formatWalkingTime(estimateWalkingDurationSeconds(totalDistance))} | Local campus route`;
        stopNavigationButton.hidden = false;
        startNavigationWatch(place);
    }

    async function fetchOpenRouteServiceWalkingRoute(startPoint, endPoint) {
        if (DIRECTIONS_API_URL) {
            const response = await fetch(DIRECTIONS_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    coordinates: [
                        [startPoint[1], startPoint[0]],
                        [endPoint[1], endPoint[0]]
                    ],
                    instructions: true,
                    units: 'm'
                })
            });

            if (!response.ok) {
                const message = await response.text();
                throw new Error(message || 'Could not calculate a walking route.');
            }

            return response.json();
        }

        if (!ORS_API_KEY) {
            throw new Error('Navigation is unavailable because no OpenRouteService API key is configured.');
        }

        const response = await fetch(ORS_DIRECTIONS_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': ORS_API_KEY
            },
            body: JSON.stringify({
                coordinates: [
                    [startPoint[1], startPoint[0]],
                    [endPoint[1], endPoint[0]]
                ],
                instructions: true,
                units: 'm'
            })
        });

        if (!response.ok) {
            const message = await response.text();
            throw new Error(message || 'Could not calculate a walking route.');
        }

        return response.json();
    }

    function getOpenRouteServiceLatLngs(route) {
        return ((route.features && route.features[0] && route.features[0].geometry.coordinates) || [])
            .map(([lng, lat]) => [lat, lng]);
    }

    function getOpenRouteServiceSummary(route) {
        return route.features && route.features[0] && route.features[0].properties.summary;
    }

    function getRouteErrorMessage(error) {
        const fallback = error && error.message ? error.message : 'Route could not be calculated.';
        try {
            const parsed = JSON.parse(fallback);
            if (parsed.details && typeof parsed.details === 'object') {
                return parsed.details.error || parsed.details.message || parsed.error || fallback;
            }
            return parsed.details || parsed.error || fallback;
        } catch {
            return fallback;
        }
    }

    async function drawWalkingRoute(place) {
        if (!userLocation) {
            routeMessage.textContent = 'Click Nearby first to calculate walking navigation.';
            clearRoute();
            return;
        }
        routeMessage.textContent = `Calculating walking navigation to ${place.name}...`;
        activeDestinationId = place.id;
        activeDestination = place;
        try {
            const startPoint = [userLocation.latitude, userLocation.longitude];
            const endPoint = [place.lat, place.lng];
            const route = await fetchOpenRouteServiceWalkingRoute(startPoint, endPoint);
            if (activeDestinationId !== place.id) return;
            const routeLatLngs = getOpenRouteServiceLatLngs(route);
            if (routeLatLngs.length < 2) throw new Error('No walking route was found.');
            clearRoute();
            activeDestinationId = place.id;
            activeDestination = place;
            drawRouteLine(routeLatLngs, { color: '#16a34a', weight: 6, opacity: 0.9, dashArray: null });
            const summary = getOpenRouteServiceSummary(route);
            routeMessage.textContent = summary
                ? `${place.name}: ${formatDistance(summary.distance)} | ${formatWalkingTime(summary.duration)}`
                : `${place.name}: Navigation started`;
            stopNavigationButton.hidden = false;
            startNavigationWatch(place);
        } catch (error) {
            try {
                const startPoint = [userLocation.latitude, userLocation.longitude];
                const endPoint = [place.lat, place.lng];
                drawCampusFallbackRoute(startPoint, endPoint, place);
            } catch (fallbackError) {
                clearRoute();
                routeMessage.textContent = `Could not calculate navigation to ${place.name}: ${getRouteErrorMessage(error)}`;
                console.error(error);
                console.error(fallbackError);
            }
        }
    }

    function addPlacesToMap(nextPlaces = visiblePlaces) {
        buildingMarkers.forEach(m => m.remove());
        sectionMarkers.forEach(m => m.remove());
        buildingMarkers = []; sectionMarkers = [];

        const mapMode = activeNearbyCategory || activeCategory;

        function renderMicrowaveMarkers() {
            getMicrowaveMarkerGroups(nextPlaces).forEach(group => {
                const marker = L.marker([group.lat, group.lng], {
                    icon: getMicrowaveIcon(group.count),
                    placeId: group.place.id
                })
                    .addTo(map)
                    .bindPopup(getMicrowavePopupHtml(group), popupOptions);
                marker.on('click', () => selectPlace(group.place));
                buildingMarkers.push(marker);
            });
        }

        function renderPrinterMarkers() {
            getPrinterMarkerGroups(nextPlaces).forEach(group => {
                const marker = L.marker([group.lat, group.lng], {
                    icon: getPrinterIcon(group.count),
                    placeId: group.place.id
                })
                    .addTo(map)
                    .bindPopup(getPrinterPopupHtml(group), popupOptions);
                marker.on('click', () => selectPlace(group.place));
                buildingMarkers.push(marker);
            });
        }

        if (mapMode === 'microwaves') {
            renderMicrowaveMarkers();
            return;
        }

        if (mapMode === 'printers') {
            renderPrinterMarkers();
            return;
        }

        nextPlaces.forEach(place => {
            const markerIcon = isRestaurant(place)
                ? getRestaurantIcon(place)
                : isTHSPlace(place)
                    ? getTHSBuildingIcon()
                    : buildingIcon;
            const marker = L.marker([place.lat, place.lng], {
                icon: markerIcon,
                placeId: place.id
            })
                .addTo(map)
                .bindPopup(getPopupHtml(place), popupOptions);
            marker.on('click', () => selectPlace(place));
            buildingMarkers.push(marker);

            const renderableSections = getRenderableSections(place);
            if (renderableSections.length) {
                renderableSections.forEach((section, index) => {
                    const latOffset = 0.00008 + (index * 0.00003);
                    const lngOffset = -0.00008 + (index * 0.00003);
                    const sectionMarker = L.marker(
                        [section.lat || place.lat + latOffset, section.lng || place.lng + lngOffset],
                        { icon: getSectionIcon(section) }
                    )
                        .addTo(map)
                        .bindPopup(`
                            <div class="map-popup">
                                <h3>${escapeHtml(section.name)}</h3>
                                <p>${escapeHtml(section.buildingName || place.name)}</p>
                                ${section.description ? `<p>${escapeHtml(section.description)}</p>` : ''}
                                <button class="popup-navigate-button" type="button" data-navigate-place-id="${escapeHtml(place.id)}">Navigate</button>
                                ${section.mapsUrl ? `<a href="${escapeHtml(section.mapsUrl)}" target="_blank" rel="noreferrer">Open in Maps</a>` : ''}
                            </div>
                        `, popupOptions);
                    sectionMarker.on('click', () => selectPlace(place));
                    sectionMarkers.push(sectionMarker);
                });
            }
        });

        if (mapMode === 'all') {
            renderMicrowaveMarkers();
            renderPrinterMarkers();
        }
    }

    async function fetchRoomSchedule() {
        if (!ROOM_SCHEDULE_API_URL) {
            return null;
        }

        try {
            const response = await fetch(ROOM_SCHEDULE_API_URL);
            if (!response.ok) throw new Error('The room schedule API did not respond correctly.');
            return await response.json();
        } catch (error) {
            console.error('Could not load room schedule', error);
            return null;
        }
    }

    async function loadPlaces() {
        try {
            const [placesResponse, scheduleData] = await Promise.all([
                fetch(API_URL),
                fetchRoomSchedule()
            ]);
            if (!placesResponse.ok) throw new Error('The API did not respond correctly.');
            const basePlaces = await placesResponse.json();
            places = mergePlacesWithSchedule(basePlaces, scheduleData && scheduleData.buildings ? scheduleData.buildings : []);
            setVisiblePlaces([], `${places.length} places loaded${scheduleData ? ' - live room booking active' : ''} - search or choose a category`);
            updateNearbyPanel();
        } catch (error) {
            statusMessage.textContent = !API_BASE_URL
                ? 'Could not load live backend data. Set window.CAMPUSFINDER_API_BASE_URL in frontend/js/config.js after deploying the backend.'
                : 'Could not load data. Start the backend with: python backend/api.py';
            console.error(error);
        }
    }

    function selectPlace(place) {
        if (!visiblePlaces.some(item => item.id === place.id)) {
            activeCategory = null;
            updateCategoryButtons();
            setVisiblePlaces([place], `Showing ${place.name}`);
        }

        map.flyTo([place.lat, place.lng], 17, { duration: 0.8 });
        const marker = buildingMarkers.find(item => {
            const pos = item.getLatLng();
            return pos.lat === place.lat && pos.lng === place.lng;
        }) || buildingMarkers.find(item => item.options.placeId === place.id);
        if (marker) marker.openPopup();
        routeMessage.textContent = 'Press Navigate in the popup to start walking navigation.';
    }

    async function navigateToPlace(place) {
        if (!place) return;
        if (!userLocation) {
            const located = await showUserLocation();
            if (!located) {
                routeMessage.textContent = 'Location is required to start navigation. Open the site on localhost or HTTPS and allow location access in the browser.';
                return;
            }
        }
        if (userLocation) {
            await drawWalkingRoute(place);
        }
    }

    function openPlaceFromParams() {
        const placeId = pageParams.get('place');
        if (!placeId) return null;
        const place = places.find(item => item.id === placeId);
        if (place) {
            selectPlace(place);
            return place;
        }
        return null;
    }

    function getNavigationDestinationFromParams(selectedPlace) {
        if (pageParams.get('autoNavigate') !== '1') return null;

        const roomName = pageParams.get('room');
        const lat = Number(pageParams.get('lat'));
        const lng = Number(pageParams.get('lng'));

        if (selectedPlace) {
            return {
                ...selectedPlace,
                name: roomName || selectedPlace.name,
                lat: Number.isFinite(lat) ? lat : selectedPlace.lat,
                lng: Number.isFinite(lng) ? lng : selectedPlace.lng
            };
        }

        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;

        return {
            id: `external-destination-${roomName || 'room'}`,
            name: roomName || 'Destination',
            lat,
            lng,
            rooms: [],
            roomCount: 0
        };
    }

    function renderTemporaryDestinationMarker(place) {
        if (!place) return;
        if (paramDestinationMarker) {
            paramDestinationMarker.remove();
        }

        paramDestinationMarker = L.marker([place.lat, place.lng], {
            icon: buildingIcon
        }).addTo(map).bindPopup(`
            <div class="map-popup">
                <h3>${escapeHtml(place.name)}</h3>
                <p>Navigation destination</p>
            </div>
        `, popupOptions);
        paramDestinationMarker.openPopup();
    }

    async function autoNavigateFromParams(selectedPlace) {
        const destination = getNavigationDestinationFromParams(selectedPlace);
        if (!destination) return;

        if (!selectedPlace) {
            renderTemporaryDestinationMarker(destination);
            map.flyTo([destination.lat, destination.lng], 17, { duration: 0.8 });
        }

        routeMessage.textContent = `Preparing navigation to ${destination.name}...`;
        statusMessage.textContent = 'Fetching your location for navigation...';
        const located = await showUserLocation();
        if (!located) {
            routeMessage.textContent = `Location is required to navigate to ${destination.name}. Allow location access and try again.`;
            return;
        }
        await drawWalkingRoute(destination);
    }

    function search() {
        const q = normalizeSearchText(input.value.trim());
        if (!q) {
            dropdown.classList.remove('show');
            categoryFilters.parentElement.hidden = false;
            const categoryPlaces = getCategoryPlaces(activeCategory);
            setVisiblePlaces(
                categoryPlaces,
                activeCategory
                    ? `${categoryPlaces.length} places shown`
                    : `${places.length} places loaded - search or choose a category`
            );
            return;
        }

        stopNavigationForContextChange('Navigation stopped because you started a new search.');
        hideNearbyPanel();
        box.classList.add('active');
        categoryFilters.parentElement.hidden = true;
        activeCategory = null;
        activeNearbyCategory = null;
        updateCategoryButtons();
        updateNearbyPanel();
        const filtered = getSearchResults();
        setVisiblePlaces(filtered, `${filtered.length} search results shown on map`);
        showResults(filtered);
    }

    function getMatchingRooms(place) {
        const q = normalizeSearchText(input.value.trim());
        if (!q) return [];
        return (place.rooms || [])
            .filter(room => roomMatchesQuery(room, q))
            .slice(0, 5);
    }

    function showResults(items) {
        if (!items.length) {
            dropdown.innerHTML = '<div class="result muted">No results found</div>';
            dropdown.classList.add('show');
            return;
        }
        dropdown.innerHTML = items.map(place => {
            const matchingRooms = getMatchingRooms(place);
            const roomNames = matchingRooms.map(room => {
                const bookingStatus = formatBookingStatus(room.bookingStatus);
                if (!bookingStatus) return escapeHtml(room.name);
                return `${escapeHtml(room.name)} - ${escapeHtml(bookingStatus.text)}`;
            }).join(', ');
            const distanceInMeters = getDistanceForPlace(place);
            const metaText = roomNames || `${place.roomCount || (place.rooms || []).length} rooms`;
            return `
                <div class="result" data-place-id="${escapeHtml(place.id)}">
                    <strong>${escapeHtml(place.name)}</strong>
                    <span>${metaText}${distanceInMeters != null ? ` | ${formatDistance(distanceInMeters)}` : ''}</span>
                </div>
            `;
        }).join('');
        dropdown.classList.add('show');
        dropdown.querySelectorAll('.result[data-place-id]').forEach(result => {
            result.addEventListener('click', () => {
                const place = places.find(item => item.id === result.dataset.placeId);
                if (place) { selectPlace(place); dropdown.classList.remove('show'); }
            });
        });
    }

    function clearSearch() {
        stopNavigationForContextChange('Navigation stopped because the search was cleared.');
        input.value = '';
        box.classList.remove('active');
        dropdown.classList.remove('show');
        dropdown.innerHTML = '';
        categoryFilters.parentElement.hidden = false;
        activeNearbyCategory = null;
        hideNearbyPanel();
        updateNearbyPanel();
        const categoryPlaces = getCategoryPlaces(activeCategory);
        setVisiblePlaces(
            categoryPlaces,
            activeCategory
                ? `${categoryPlaces.length} places shown`
                : `${places.length} places loaded - search or choose a category`
        );
        input.focus();
    }

    async function showUserLocation() {
        nearbyToggleButton.disabled = true;
        nearbyToggleButton.textContent = 'Locating...';
        statusMessage.textContent = 'Fetching your location...';
        try {
            const nextLocation = await requestUserLocation();
            setUserLocationOnMap(nextLocation);
            map.flyTo([userLocation.latitude, userLocation.longitude], 17, { duration: 0.8 });
            let locationStatus = `Showing distances from your location. Accuracy ${Math.round(userLocation.accuracy || 0)} m.`;
            if (activeNearbyCategory) {
                const nearbyPlaces = getNearbyPlaces(activeNearbyCategory);
                const label = getNearbyCategoryLabel(activeNearbyCategory);
                setVisiblePlaces(nearbyPlaces, `${nearbyPlaces.length} nearest ${label} shown`);
                locationStatus = `${nearbyPlaces.length} nearest ${label} shown from your location.`;
            } else {
                addPlacesToMap();
            }
            updateNearbyPanel();
            clearRoute();
            routeMessage.textContent = 'Select a place and press Navigate.';
            statusMessage.textContent = locationStatus;
            return true;
        } catch (error) {
            statusMessage.textContent = error.message;
            routeMessage.textContent = 'Location is required for nearby results and navigation. Allow location access or open the site through localhost or HTTPS.';
            return false;
        } finally {
            nearbyToggleButton.disabled = false;
            nearbyToggleButton.textContent = 'Nearby';
        }
    }

    searchButton.addEventListener('click', search);
    clearSearchButton.addEventListener('click', clearSearch);
    stopNavigationButton.addEventListener('click', () => {
        stopNavigation('Navigation stopped.');
    });
    nearbyToggleButton.addEventListener('click', async () => {
        if (nearbyPanelOpen) {
            hideNearbyPanel();
            return;
        }

        stopNavigationForContextChange('Navigation stopped because you opened nearby.');
        input.value = '';
        box.classList.remove('active');
        dropdown.classList.remove('show');
        dropdown.innerHTML = '';
        categoryFilters.parentElement.hidden = false;
        activeCategory = null;
        activeNearbyCategory = 'all';
        updateCategoryButtons();
        setNearbyPanelOpen(true);

        const located = await showUserLocation();
        if (!located) {
            updateNearbyPanel();
            return;
        }

        const nearbyPlaces = getNearbyPlaces(activeNearbyCategory);
        setVisiblePlaces(nearbyPlaces, `${nearbyPlaces.length} nearest places shown`);
        updateNearbyPanel();
    });
    nearbyFilters.addEventListener('click', async event => {
        const button = event.target.closest('.nearby-chip');
        if (!button) return;

        stopNavigationForContextChange('Navigation stopped because you changed nearby filters.');
        const nextNearbyCategory = activeNearbyCategory === button.dataset.nearbyCategory
            ? null
            : button.dataset.nearbyCategory;
        activeNearbyCategory = nextNearbyCategory;
        activeCategory = null;
        input.value = '';
        box.classList.remove('active');
        dropdown.classList.remove('show');
        dropdown.innerHTML = '';
        updateCategoryButtons();
        updateNearbyPanel();

        if (!activeNearbyCategory) {
            setVisiblePlaces([], `${places.length} places loaded - search or choose a category`);
            return;
        }

        if (!userLocation) {
            const located = await showUserLocation();
            if (!located) {
                updateNearbyPanel();
                return;
            }
        }

        const nearbyPlaces = getNearbyPlaces(activeNearbyCategory);
        const label = getNearbyCategoryLabel(activeNearbyCategory);
        setVisiblePlaces(nearbyPlaces, `${nearbyPlaces.length} nearest ${label} shown`);
        updateNearbyPanel();
    });
    categoryFilters.addEventListener('click', event => {
        const button = event.target.closest('.category-chip');
        if (!button) return;

        stopNavigationForContextChange('Navigation stopped because you changed map filters.');
        const nextCategory = activeCategory === button.dataset.category ? null : button.dataset.category;
        activeCategory = nextCategory;
        activeNearbyCategory = null;
        input.value = '';
        box.classList.remove('active');
        dropdown.classList.remove('show');
        dropdown.innerHTML = '';
        updateCategoryButtons();
        updateNearbyPanel();

        const categoryPlaces = getCategoryPlaces(activeCategory);
        setVisiblePlaces(
            categoryPlaces,
            activeCategory
                ? `${categoryPlaces.length} places shown`
                : `${places.length} places loaded - search or choose a category`
        );
    });
    document.addEventListener('click', event => {
        const navigateButton = event.target.closest('.popup-navigate-button');
        if (!navigateButton) return;
        const place = places.find(item => item.id === navigateButton.dataset.navigatePlaceId);
        navigateToPlace(place);
    });
    input.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
            event.preventDefault();
            search();
        }
    });
    input.addEventListener('input', () => {
        if (input.value.trim()) { box.classList.add('active'); search(); }
        else {
            stopNavigationForContextChange('Navigation stopped because the search changed.');
            box.classList.remove('active');
            dropdown.classList.remove('show');
            categoryFilters.parentElement.hidden = false;
            activeNearbyCategory = null;
        hideNearbyPanel();
        updateNearbyPanel();
            const categoryPlaces = getCategoryPlaces(activeCategory);
            setVisiblePlaces(
                categoryPlaces,
                activeCategory
                    ? `${categoryPlaces.length} places shown`
                    : `${places.length} places loaded - search or choose a category`
            );
        }
    });

    loadPlaces().then(async () => {
        if (pageParams.get('q')) { input.value = pageParams.get('q'); search(); }
        const selectedPlace = openPlaceFromParams();
        await autoNavigateFromParams(selectedPlace);
        updateCategoryScrollHint();

        // Auto-activate a category from URL param (e.g. ?category=buildings)
        const paramCategory = pageParams.get('category');
        if (!pageParams.get('q') && !selectedPlace) {
            activeCategory = paramCategory || 'buildings';
            updateCategoryButtons();
            const categoryPlaces = getCategoryPlaces(activeCategory);
            setVisiblePlaces(categoryPlaces, `${categoryPlaces.length} places shown`);
        }
    });

    categoryFilters.addEventListener('scroll', updateCategoryScrollHint, { passive: true });
    nearbyFilters.addEventListener('scroll', updateNearbyScrollHint, { passive: true });
    categoryScrollButton.addEventListener('click', () => {
        categoryFilters.scrollBy({
            left: Math.max(180, Math.round(categoryFilters.clientWidth * 0.7)),
            behavior: 'smooth'
        });
    });
    nearbyScrollButton.addEventListener('click', () => {
        nearbyFilters.scrollBy({
            left: Math.max(180, Math.round(nearbyFilters.clientWidth * 0.7)),
            behavior: 'smooth'
        });
    });
    window.addEventListener('resize', () => {
        updateCategoryScrollHint();
        updateNearbyScrollHint();
    });
</script>
</body>
</html>
